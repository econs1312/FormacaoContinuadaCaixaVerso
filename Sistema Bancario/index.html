<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureBank - Painel Administrativo</title>

    <!-- Bootstrap para agilizar a estrutura visual da página -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS próprio do projeto -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Cabeçalho principal do sistema -->
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">
                <strong>FutureBank</strong> | Sistema Interno
            </a>
        </div>
    </nav>

    <div class="container">
        <!-- Espaço usado pelo JavaScript para mostrar mensagens -->
        <div id="mensagem-sistema" class="mb-3"></div>

        <!-- Menu de abas do sistema -->
        <ul class="nav nav-tabs mb-4" id="bankTab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="clientes-tab" data-bs-toggle="tab" data-bs-target="#clientes" type="button">
                    Gestão de Clientes
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="contas-tab" data-bs-toggle="tab" data-bs-target="#contas" type="button">
                    Gestão de Contas
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="transacoes-tab" data-bs-toggle="tab" data-bs-target="#transacoes" type="button">
                    Transações
                </button>
            </li>
        </ul>

        <div class="tab-content" id="bankTabContent">

            <!-- Aba de clientes: cadastro e listagem -->
            <div class="tab-pane fade show active" id="clientes" role="tabpanel">
                <div class="card card-body shadow-sm mb-4">
                    <h5>Novo Cliente</h5>

                    <form id="form-cliente" class="row g-3">
                        <div class="col-md-4">
                            <label for="cli-nome" class="form-label">Nome completo</label>
                            <input type="text" id="cli-nome" class="form-control" placeholder="Digite o nome" required>
                        </div>

                        <div class="col-md-3">
                            <label for="cli-cpf" class="form-label">CPF</label>
                            <input type="text" id="cli-cpf" class="form-control" placeholder="Somente números" required>
                        </div>

                        <div class="col-md-3">
                            <label for="cli-email" class="form-label">E-mail</label>
                            <input type="email" id="cli-email" class="form-control" placeholder="exemplo@email.com" required>
                        </div>

                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-success w-100">Cadastrar</button>
                        </div>
                    </form>
                </div>

                <table class="table table-hover bg-white shadow-sm">
                    <thead class="table-dark">
                        <tr>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Email</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-clientes"></tbody>
                </table>
            </div>

            <!-- Aba de contas: abertura e controle das contas -->
            <div class="tab-pane fade" id="contas" role="tabpanel">
                <div class="card card-body shadow-sm mb-4">
                    <h5>Abrir Nova Conta</h5>

                    <form id="form-conta" class="row g-3">
                        <div class="col-md-5">
                            <label for="sel-cliente" class="form-label">Cliente</label>
                            <select id="sel-cliente" class="form-select" required>
                                <option value="">Selecione o cliente...</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="sel-tipo-conta" class="form-label">Tipo de conta</label>
                            <select id="sel-tipo-conta" class="form-select" required>
                                <option value="Corrente">Corrente</option>
                                <option value="Poupança">Poupança</option>
                            </select>
                        </div>

                        <div class="col-md-3 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">Criar Conta</button>
                        </div>
                    </form>
                </div>

                <table class="table table-hover bg-white shadow-sm">
                    <thead class="table-dark">
                        <tr>
                            <th>Número</th>
                            <th>Cliente</th>
                            <th>Tipo</th>
                            <th>Saldo</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-contas"></tbody>
                </table>
            </div>

            <!-- Aba de transações: depósito, saque e histórico -->
            <div class="tab-pane fade" id="transacoes" role="tabpanel">
                <div class="row">
                    <div class="col-md-4">
                        <div class="card card-body shadow-sm">
                            <h5>Operação Bancária</h5>

                            <form id="form-transacao">
                                <label for="sel-conta-transacao" class="form-label">Conta de destino</label>
                                <select id="sel-conta-transacao" class="form-select mb-3" required></select>

                                <label for="tipo-operacao" class="form-label">Tipo de operação</label>
                                <select id="tipo-operacao" class="form-select mb-3">
                                    <option value="Depósito">Depósito</option>
                                    <option value="Saque">Saque</option>
                                </select>

                                <label for="valor-transacao" class="form-label">Valor (R$)</label>
                                <input type="number" id="valor-transacao" class="form-control mb-3" step="0.01" min="0.01" required>

                                <button type="submit" class="btn btn-warning w-100">Confirmar Operação</button>
                            </form>
                        </div>
                    </div>

                    <div class="col-md-8">
                        <h5>Histórico de Transações</h5>

                        <table class="table table-sm table-striped bg-white shadow-sm">
                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Conta</th>
                                    <th>Tipo</th>
                                    <th>Valor</th>
                                    <th>Saldo Novo</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-historico"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts externos e scripts do projeto -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/validacao.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
